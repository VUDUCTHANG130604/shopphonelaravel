services:
  nginx:
    build:
      context: ./docker/nginx
    container_name: app_nginx_laravel
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - nginx_logs:/var/log/nginx
    depends_on:
      - php82
    networks:
      - app_network_laravel

  php82:
    build:
      context: ./docker/php/php82
    container_name: app_php82_laravel
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php82/php.ini:/usr/local/etc/php/conf.d/custom.ini
    working_dir: /var/www/html
    networks:
      - app_network_laravel

  mysql:
    image: mysql:8.0
    container_name: app_mysql_laravel
    restart: always
    environment:
      # MYSQL_ROOT_PASSWORD: ${DB_ROOT-PASSWORD}
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network_laravel
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: app_phpmyadmin_laravel
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: 300M
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network_laravel

volumes:
  mysql_data:
  nginx_logs:
  php_logs:
  mysql_logs:

networks:
  app_network_laravel:
    driver: bridge